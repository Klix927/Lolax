<!DOCTYPE html>
<html lang="de">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <script>
    (function(){
      try {
        var t = localStorage.getItem('lolax-theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      } catch(e){}
    })();
  </script>

<body>

  <a href="#main-content" class="skip-link">Zum Hauptinhalt springen</a>

  <header class="header" role="banner">
    <div class="container">
      <div class="header__inner">
        <a href="/" class="logo" aria-label="Lolax – Zur Startseite">
          <span class="logo__mark" aria-hidden="true">
            <svg width="15" height="23" viewBox="0 0 15 23" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="0" y="0"  width="3"  height="23" rx="1.5" fill="currentColor"/>
              <rect x="0" y="0"  width="12" height="3"  rx="1.5" fill="currentColor"/>
              <rect x="0" y="20" width="12" height="3"  rx="1.5" fill="currentColor"/>
            </svg>
          </span>
          <span class="logo__wordmark">LOLAX</span>
        </a>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Dunkles Design aktivieren">
          <span class="theme-toggle__icon" aria-hidden="true">○</span>
          <span class="theme-toggle__label">Dunkel</span>
        </button>
      </div>
    </div>
  </header>

  <main id="main-content">
    <div class="container">
      <div class="legal-page">
        <h1 class="legal-page__title">Seite nicht gefunden</h1>

          <p><a href="/">Zurück zur Startseite</a></p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer__inner">
        <p class="footer__copy">© 2026 Lolax &nbsp;·&nbsp; Felix Kempf &nbsp;·&nbsp; Leipzig</p>
        <nav class="footer__links" aria-label="Rechtliche Links">
          <a href="impressum.html"   class="footer__link">Impressum</a>
          <a href="datenschutz.html" class="footer__link">Datenschutz</a>
          <button type="button" class="footer__link" data-consent-open>Cookie-Einstellungen</button>
        </nav>
      </div>
    </div>

  <div id="consent-root" hidden></div>
  <script src="consent.js"></script>
  <script src="main.js"></script>
